{% extends 'base.html' %}
{% block title %}Smart LPU - Create Session{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="glass-strong p-4 p-md-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <span class="fw-semibold">Create Attendance Session</span>
          <span class="badge badge-soft">Smart LPU</span>
        </div>
        <form method="post" class="row g-3">
          {% csrf_token %}
          {{ form.as_p }}
          <div class="col-12 d-flex gap-2">
            <button class="btn btn-smart text-white fw-semibold" type="submit">Create Session</button>
            <a class="btn btn-outline-smart" href="{% url 'attendance_home' %}">Cancel</a>
          </div>
        </form>

        <div class="mt-4">
          <div class="small" style="color: #0b1220;">
            Please configure courses, students, and enrollments from <a class="fw-semibold" style="color: #0b1220; text-decoration: underline;" href="/admin/">Admin Panel</a> first.
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
